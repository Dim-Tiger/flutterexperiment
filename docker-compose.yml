version: '3.8'

services:
  # Backend API Server
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:musicpractice2024@db:5432/music_practice_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=music-practice-jwt-secret-production-2024-secure-key
      - JWT_REFRESH_SECRET=music-practice-refresh-secret-production-2024-secure-key
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_EXPIRES_IN=30d
      - ALLOWED_ORIGINS=http://localhost:8080,http://localhost:3000,https://your-frontend-domain.com
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
      - MAX_FILE_SIZE=10485760
      - MAX_FILES_PER_REQUEST=5
      # Add your Cloudinary credentials here:
      # - CLOUDINARY_CLOUD_NAME=your-cloud-name
      # - CLOUDINARY_API_KEY=your-api-key
      # - CLOUDINARY_API_SECRET=your-api-secret
      # Optional Stripe for marketplace:
      # - STRIPE_SECRET_KEY=sk_test_your_stripe_secret_key
      # - STRIPE_WEBHOOK_SECRET=whsec_your_webhook_secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - music-practice-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=music_practice_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=musicpractice2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # Remove this in production for security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - music-practice-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"  # Remove this in production for security
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - music-practice-network

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Add your SSL certificates here
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - music-practice-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  music-practice-network:
    driver: bridge